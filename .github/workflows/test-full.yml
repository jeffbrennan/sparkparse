name: test-full

on:
  pull_request:
    types: [opened, reopened]
  workflow_dispatch:

# Full CI including JVM/PySpark integration tests. Runs automatically on PRs
# and can be triggered manually from Actions → test-full → Run workflow.

jobs:
  test-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: uv sync --dev

      - name: Generate small integration-test data
        run: uv run falsa groupby --path-prefix data/raw --size SMALL --k 100 --nas 0 --data-format PARQUET

      - name: Run full CI
        run: just ci-full
